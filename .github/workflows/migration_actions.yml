name: Migration actions

on:
  workflow_run:
    workflows: [Migration checks]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  migration_actions:
    if: github.event.workflow_run.conclusion == 'success'
    uses: equinor/armada/.github/workflows/migration_actions.yml@main
    with:
      stage_one_workflow_run_id: ${{ github.event.workflow_run.id }}
      migration_docs_url: https://github.com/equinor/isar/tree/main/alembic/README.md
