repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3
        args: []
        exclude: gen/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
#This can potentially be a slow pre-commit hook.
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: pytest 
        language: system
        pass_filenames: false
        always_run: true
